services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-employment_db}
      POSTGRES_USER: ${DB_USER:-employment_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-employment_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  migrate:
    image: employment_app_backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-False}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    restart: "no"

  backend:
    image: employment_app_backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-False}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - media_data:/usr/share/nginx/html/media:ro
      - staticfiles_data:/usr/share/nginx/html/staticfiles:ro
    restart: always

volumes:
  postgres_data:
  media_data:
  staticfiles_data:
